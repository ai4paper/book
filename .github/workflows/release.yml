name: Create Release

on:
  push:
    tags:
      - "v*" # This workflow runs when any tag starting with 'v' is pushed

jobs:
  build:
    name: Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write # needed for softprops/action-gh-release to publish
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so we can build release notes from commits

      - name: Install Source Han Serif and Typst
        run: |
          # Download and install Source Han Serif (the CJK fallback font).
          # Use the CN subset build: its OTFs carry the plain family name
          # "Source Han Serif" that ai4paper.typ requests (the SC build is
          # named "Source Han Serif SC", which Typst reports as unknown).
          wget -q https://github.com/adobe-fonts/source-han-serif/releases/download/2.003R/14_SourceHanSerifCN.zip
          unzip -q 14_SourceHanSerifCN.zip -d source-han-serif
          sudo mkdir -p /usr/share/fonts/opentype/source-han-serif
          sudo cp source-han-serif/SubsetOTF/CN/*.otf /usr/share/fonts/opentype/source-han-serif/
          sudo fc-cache -fv

          # Verify font installation
          fc-list | grep "Source Han Serif" || echo "Warning: Source Han Serif not found in font cache"

          # Install Typst
          curl -fsSL https://github.com/typst/typst/releases/latest/download/typst-x86_64-unknown-linux-musl.tar.xz | tar -xJ
          sudo mv typst-x86_64-unknown-linux-musl/typst /usr/local/bin/
          typst --version

      - name: Get previous tag
        id: previoustag
        run: |
          echo "PREVIOUS_TAG=$(git describe --tags --abbrev=0 $(git rev-list --tags --skip=1 --max-count=1) 2>/dev/null || echo '')" >> $GITHUB_ENV
          echo "CURRENT_TAG=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV

      # Prefer the hand-written `## X.Y.Z` block from CHANGELOG.md (everything up
      # to the next `## `). If that section — or the file — is absent, fall back
      # to notes auto-generated from the git log since the previous tag. Notes are
      # written to a file and handed to the release step via `body_path`.
      - name: Generate release notes
        id: generate_notes
        shell: sh -e {0}
        run: |
          VERSION="${CURRENT_TAG#v}"
          NOTES="$RUNNER_TEMP/notes.md"
          : > "$NOTES"

          if [ -f CHANGELOG.md ]; then
            awk -v hdr="## ${VERSION}" '
              $0 == hdr { found = 1; next }
              found && /^## / { exit }
              found { print }
            ' CHANGELOG.md > "$NOTES"
            # strip leading blank lines
            sed -i -e '/./,$!d' "$NOTES"
          fi

          if grep -q '[^[:space:]]' "$NOTES"; then
            echo "Using CHANGELOG.md '## ${VERSION}' section for release notes."
          else
            echo "::warning::No '## ${VERSION}' section in CHANGELOG.md — generating notes from git log."
            if [ -n "$PREVIOUS_TAG" ]; then
              echo "## Changes since $PREVIOUS_TAG" >> "$NOTES"
              echo "" >> "$NOTES"
              git log --pretty=format:"* %s (%an) [%h](https://github.com/${{ github.repository }}/commit/%H)" "$PREVIOUS_TAG..$CURRENT_TAG" >> "$NOTES"
            else
              echo "## Initial Release" >> "$NOTES"
              echo "" >> "$NOTES"
              git log --pretty=format:"* %s (%an) [%h](https://github.com/${{ github.repository }}/commit/%H)" >> "$NOTES"
            fi
            echo "" >> "$NOTES"
          fi

          echo "notes_file=$NOTES" >> "$GITHUB_OUTPUT"

      - name: Compile Typst document
        run: |
          mkdir -p build
          echo "Compiling ai4paper.typ"
          typst compile --root . ai4paper.typ "build/ai4paper-${CURRENT_TAG}.pdf"

      - name: List generated PDFs
        run: |
          echo "Generated PDFs in build:"
          ls -la build || echo "No PDFs found in build"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ env.CURRENT_TAG }}
          body_path: ${{ steps.generate_notes.outputs.notes_file }}
          draft: false
          prerelease: false
          files: |
            build/*.pdf
        env:
          # Built-in token; works out of the box with `contents: write` above.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
